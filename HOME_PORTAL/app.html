<!-- html5-qrcode CDN -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<div class="qr-overlay" id="qr-overlay" role="dialog" aria-modal="true" aria-labelledby="qr-title">
  <div class="qr-header">
    <h3 id="qr-title">📷 Scan QR / Barcode</h3>
    <p>Arahkan kamera ke QR Code atau Barcode kartu MK / NIK</p>
  </div>
  <div class="qr-viewport">
    <div id="qr-reader"></div>
  </div>
  <div class="qr-result-text" id="qr-result-text"></div>
  <div class="qr-loading" id="qr-loading"></div>
  <div class="qr-diagnostic" id="qr-diagnostic"></div>
  <button class="qr-close-btn" id="qr-close-btn" data-action="close-qr" type="button">✕ TUTUP</button>
</div>

<div class="scan-toast" id="scan-toast" role="status" aria-live="polite"></div>

<script>
// ── QR Scanner State ──────────────────────────────────────
const QR = {
  html5QrCode: null,
  stream: null,
  video: null,
  detector: null,
  scanFrame: null,
  isScanning: false,
  isStarting: false,
  isStopping: false,
  context: null,
  usingNative: false,
  successHandled: false
};

// ── State ──────────────────────────────────────────────────
const STATE = {
  currentUser: null,
  masuk:    { selectedNIK: null, selectedNama: null, selectedDept: null, selectedJabatan: null, scannedSerial: null },
  keluar:   { scannedSerial: null, bindingData: null },
  security: { scannedSerial: null }
};

const REQUEST_BUSY = {
  masukConfirm: false,
  keluarScan: false,
  keluarConfirm: false,
  securityScan: false
};

const REPORT_CACHE = {
  absen: null
};

// ── AUTHENTICATION ─────────────────────────────────────────
function applyRolePermissions(role) {
  const TABS = {
    'masuk': ['ADMINISTRATOR', 'SECURITY', 'KARYAWAN'],
    'keluar': ['ADMINISTRATOR', 'SECURITY', 'KARYAWAN'],
    'security': ['SECURITY', 'PENGAWAS'], 
    'dashboard': ['ADMINISTRATOR', 'PENGAWAS'],
    'cek-absen': ['ADMINISTRATOR', 'PENGAWAS', 'SECURITY', 'KARYAWAN'],
    'cek-area': ['ADMINISTRATOR', 'PENGAWAS', 'SECURITY'],
    'export-laporan': ['ADMINISTRATOR'],
    'revisi-catatan': ['ADMINISTRATOR']
  };

  let defaultTab = null;
  const validRoles = ['ADMINISTRATOR', 'PENGAWAS', 'SECURITY'];
  const roleKey = validRoles.includes(role) ? role : 'KARYAWAN';

  // Default tabs
  if (roleKey === 'ADMINISTRATOR') defaultTab = 'dashboard';
  else if (roleKey === 'PENGAWAS') defaultTab = 'cek-absen';
  else if (roleKey === 'SECURITY') defaultTab = 'security';
  else defaultTab = 'masuk';

  for (const tab in TABS) {
    const btn = document.getElementById('tab-btn-' + tab);
    if (TABS[tab].includes(roleKey)) {
      if (btn) btn.style.display = 'flex';
    } else {
      if (btn) btn.style.display = 'none';
    }
  }

  const userNameEl = document.getElementById('header-user-name');
  if (userNameEl && STATE.currentUser) {
    const firstName = (STATE.currentUser.nama || 'User').split(' ')[0];
    userNameEl.textContent = firstName + ' (' + roleKey + ')';
    
    const absenNik = document.getElementById('cek-absen-nik');
    if (absenNik && roleKey === 'KARYAWAN') {
      absenNik.value = STATE.currentUser.nik;
      absenNik.disabled = true;
    }
  }

  // Switch to default tab
  if (defaultTab) switchTab(defaultTab);
  
  // Show header and tab bar
  document.getElementById('app-header').style.display = 'flex';
  document.getElementById('app-tabbar').style.display = 'flex';
  
  // Hide login page
  document.getElementById('page-login').classList.remove('active');
  document.getElementById('page-login').style.display = 'none';
}

function handleLoginSubmit() {
  const nik = (document.getElementById('login-nik').value || '').trim();
  const pwd = (document.getElementById('login-password').value || '').trim();
  
  if (!nik) {
    showScanToast("NIK wajib diisi.");
    return;
  }
  
  const btn = document.querySelector('.btn-login');
  btn.classList.add('pulse-anim');
  btn.innerHTML = 'MASUK...';
  btn.disabled = true;
  
  google.script.run
    .withFailureHandler(err => {
      btn.disabled = false;
      btn.classList.remove('pulse-anim');
      btn.innerHTML = 'MASUK';
      showScanToast('Error koneksi: ' + err.message);
    })
    .withSuccessHandler(res => {
      btn.disabled = false;
      btn.classList.remove('pulse-anim');
      btn.innerHTML = 'MASUK';
      if (!res.ok) {
        showScanToast(res.msg);
        return;
      }
      
      STATE.currentUser = res.karyawan;
      if (res.depts) STATE.availableDepts = res.depts;
      
      localStorage.setItem('dam_session', JSON.stringify(res.karyawan));
      
      // Populate security-dept dropdown
      const deptSelect = document.getElementById('security-dept');
      if (deptSelect && res.depts) {
        deptSelect.innerHTML = '<option value="">-- Pilih Departemen --</option>';
        res.depts.forEach(d => {
          const opt = document.createElement('option');
          opt.value = d;
          opt.textContent = d;
          deptSelect.appendChild(opt);
        });
      }
      
      // Auto-populate for MASUK tab
      STATE.masuk.selectedNIK = res.karyawan.nik;
      STATE.masuk.selectedNama = res.karyawan.nama;
      STATE.masuk.selectedDept = res.karyawan.dept;
      STATE.masuk.selectedJabatan = res.karyawan.jabatan;
      
      const inNik = document.getElementById('masuk-nik');
      const inNama = document.getElementById('masuk-nama-input');
      if (inNik) inNik.value = res.karyawan.nik;
      if (inNama) inNama.value = res.karyawan.nama;

      applyRolePermissions(res.karyawan.role);
      updateMasukScannerVisibility();
    })
    .verifyLogin(nik, pwd);
}

// ── Tab switching ──────────────────────────────────────────
async function switchTab(tab) {
  const tabbar = document.getElementById('app-tabbar');
  const overlay = document.getElementById('sidebar-overlay');
  if (tabbar) tabbar.classList.remove('open');
  if (overlay) overlay.classList.remove('active');

  if (tab === 'dashboard') {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-dashboard').classList.add('active');
    document.getElementById('tab-btn-dashboard').classList.add('active');
    loadDashboard();
    return;
  }

  // Handle redirects for other modules
  let targetUrl = '';
  const token = '?nik=' + (STATE.currentUser ? STATE.currentUser.nik : '');
  
  google.script.run.withSuccessHandler(urls => {
      if (tab === 'masuk' || tab === 'keluar') targetUrl = urls.GATE_PABRIK + token;
      else if (tab === 'security') targetUrl = urls.AREA_KERJA + token;
      else if (tab.includes('cek') || tab.includes('export')) targetUrl = urls.REPORT + token;
      
      if (targetUrl) {
        window.location.href = targetUrl;
      } else {
        alert('URL Module belum dikonfigurasi!');
      }
  }).getModuleUrls();
}


// ── Debounce search ────────────────────────────────────────
let searchTimer = null;
function debounceSearch(q, context) {
  clearTimeout(searchTimer);
  if (q.length < 2) { closeList(context); return; }
  searchTimer = setTimeout(() => doSearch(q, context), 400);
}

function doSearch(q, context) {
  google.script.run
    .withFailureHandler(err => handleGasFailure(context, err))
    .withSuccessHandler(res => renderList(res, context))
    .searchKaryawan(q);
}

function renderList(res, context) {
  const list = document.getElementById(context + '-list');
  list.innerHTML = '';
  if (!res.ok) { showResult(context, 'error', 'Gagal mencari karyawan: ' + escHtml(res.msg)); return; }
  if (!res.data.length) { list.style.display='none'; return; }

  res.data.forEach(k => {
    const item = document.createElement('div');
    const name = document.createElement('div');
    const detail = document.createElement('div');
    item.className = 'autocomplete-item';
    name.textContent = k.nama || '-';
    detail.className = 'item-nik';
    detail.textContent = `${k.nik || '-'} · ${k.dept || '-'} · ${k.jabatan || '-'}`;
    item.addEventListener('click', () => selectKaryawan(context, k.nik || '', k.nama || '', k.dept || '', k.jabatan || ''));
    item.appendChild(name);
    item.appendChild(detail);
    list.appendChild(item);
  });
  list.style.display = 'block';
}

function closeList(context) {
  const el = document.getElementById(context + '-list');
  if (el) el.style.display = 'none';
}

function selectKaryawan(context, nik, nama, dept, jabatan) {
  STATE[context].selectedNIK     = nik;
  STATE[context].selectedNama    = nama;
  STATE[context].selectedDept    = dept;
  STATE[context].selectedJabatan = jabatan;

  document.getElementById(context + '-search').value = nama + ' (' + nik + ')';
  closeList(context);

  const info = document.getElementById(context + '-karyawan-info');
  if (info) {
    document.getElementById(context + '-avatar').textContent = nama.charAt(0);
    document.getElementById(context + '-nama').textContent   = nama;
    document.getElementById(context + '-detail').textContent = nik + ' · ' + dept + ' · ' + jabatan;
    document.getElementById(context + '-type').textContent   = 'MK';
    info.style.display = 'block';
  }

  updateMasukScannerVisibility();
}

// ── Manual serial submit ────────────────────────────────────
function submitSerial(context) {
  const val = normalizeSerial(document.getElementById(context + '-serial').value);
  if (!val) { showResult(context, 'error', 'Masukkan nomor kartu MK / NIK terlebih dahulu.'); return; }
  if (!isValidSerial(val)) { showResult(context, 'error', 'Format nomor kartu MK / NIK tidak valid.'); return; }
  onSerialScanned(context, val);
}

// ── On serial received (NFC or manual) ────────────────────
function onSerialScanned(context, serial) {
  serial = normalizeSerial(serial);
  if (!isValidSerial(serial)) {
    showResult(context, 'error', 'Format nomor kartu MK / NIK tidak valid.');
    return;
  }
  document.getElementById(context + '-serial').value = serial;

  if (context === 'masuk') {
    STATE.masuk.scannedSerial = serial;
    const display = document.getElementById('masuk-card-display');
    document.getElementById('masuk-card-num').textContent = serial;
    display.style.display = 'block';
    checkMasukReady();
    if (STATE.masuk.selectedNIK) {
      confirmMasuk(); // Auto submit if NIK is already selected
    }

  } else if (context === 'keluar') {
    if (REQUEST_BUSY.keluarScan) return;
    REQUEST_BUSY.keluarScan = true;
    STATE.keluar.scannedSerial = serial;
    showResult('keluar', 'warning', '⏳ Memeriksa kartu...');
    google.script.run
      .withFailureHandler(err => {
        REQUEST_BUSY.keluarScan = false;
        handleGasFailure('keluar', err);
      })
      .withSuccessHandler(res => handleKeluarScan(res, serial))
      .getBindingStatus(serial);

  } else if (context === 'security') {
    const deptSelect = document.getElementById('security-dept');
    const dept = deptSelect ? deptSelect.value : '';
    if (!dept) {
      showResult('security', 'error', 'Pilih departemen tujuan terlebih dahulu.');
      return;
    }
    
    const reasonRadio = document.querySelector('input[name="security_reason"]:checked');
    const reason = reasonRadio ? reasonRadio.value : '';
    
    const modeRadio = document.querySelector('input[name="security_mode"]:checked');
    const forceMode = modeRadio ? modeRadio.value : 'AUTO';
    
    if (REQUEST_BUSY.securityScan) return;
    REQUEST_BUSY.securityScan = true;
    STATE.security.scannedSerial = serial;
    showResult('security', 'warning', '⏳ Mencatat...');
    google.script.run
      .withFailureHandler(err => {
        REQUEST_BUSY.securityScan = false;
        handleGasFailure('security', err);
      })
      .withSuccessHandler(handleSecurityScan)
      .scanAreaKerja(serial, dept, reason, forceMode);
  }
}

// ── MASUK: Check ready & confirm ───────────────────────────
function isInternalUser(jabatan, dept) {
  const j = (jabatan || '').toUpperCase();
  const d = (dept || '').toUpperCase();
  if (j.includes('MITRA') || d.includes('MITRA') || j.includes('VISITOR') || d.includes('VISITOR')) {
    return false;
  }
  return true;
}

function updateMasukScannerVisibility() {
  const s = STATE.masuk;
  const card = document.getElementById('masuk-scanner-card');
  if (card) {
    const isInternal = isInternalUser(s.selectedJabatan, s.selectedDept);
    card.style.display = isInternal ? 'none' : 'block';
  }
  checkMasukReady();
}

function checkMasukReady() {
  const s = STATE.masuk;
  const btn = document.getElementById('masuk-confirm');
  const internal = isInternalUser(s.selectedJabatan, s.selectedDept);
  if (s.selectedNIK && (internal || s.scannedSerial)) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
}

function confirmMasuk() {
  if (REQUEST_BUSY.masukConfirm) return;
  const s = STATE.masuk;
  const internal = isInternalUser(s.selectedJabatan, s.selectedDept);
  
  if (!s.selectedNIK) return;
  if (!internal && !s.scannedSerial) return;

  const loker = (document.getElementById('masuk-loker').value || '').trim();
  const serialToSend = internal ? s.selectedNIK : s.scannedSerial;

  REQUEST_BUSY.masukConfirm = true;
  setActionBusy('confirm-masuk', true);
  showResult('masuk', 'warning', '⏳ Memproses...');
  document.getElementById('masuk-confirm').classList.remove('visible');

  google.script.run
    .withFailureHandler(err => {
      REQUEST_BUSY.masukConfirm = false;
      setActionBusy('confirm-masuk', false);
      handleGasFailure('masuk', err);
      document.getElementById('masuk-confirm').classList.add('visible');
    })
    .withSuccessHandler(res => {
      REQUEST_BUSY.masukConfirm = false;
      setActionBusy('confirm-masuk', false);
      if (res.ok) {
        showResult('masuk', 'success',
          `✅ <strong>${escHtml(res.karyawan.nama)}</strong> berhasil masuk pabrik.<br>
           <span class="meta">Kartu: ${escHtml(res.noKartuMK)} · ${escHtml(res.waktu)} · ${escHtml(res.shift)}</span>`);
        resetMasuk();
      } else {
        showResult('masuk', 'error', '❌ ' + escHtml(res.msg));
        document.getElementById('masuk-confirm').classList.add('visible');
      }
    })
    .bindKartu(serialToSend, s.selectedNIK, loker);
}

function resetMasuk() {
  STATE.masuk.scannedSerial = null;
  const serialIn = document.getElementById('masuk-serial');
  if (serialIn) serialIn.value = '';
  const lokerIn = document.getElementById('masuk-loker');
  if (lokerIn) lokerIn.value = '';
  const confirmBtn = document.getElementById('masuk-confirm');
  if (confirmBtn) confirmBtn.classList.remove('visible');
  updateMasukScannerVisibility();
}

function resetKeluarUi() {
  const confirmEl = document.getElementById('keluar-confirm');
  if (confirmEl) confirmEl.classList.remove('visible');

  const avatar = document.getElementById('keluar-avatar');
  const nama = document.getElementById('keluar-nama');
  const detail = document.getElementById('keluar-detail');

  if (avatar) avatar.textContent = '?';
  if (nama) nama.textContent = '-';
  if (detail) detail.textContent = '-';
  
  const lokerIn = document.getElementById('keluar-loker');
  if (lokerIn) lokerIn.value = '';
}

// ── KELUAR: Handle scan & confirm ──────────────────────────
function handleKeluarScan(res, serial) {
  REQUEST_BUSY.keluarScan = false;
  if (!res.ok) {
    showResult('keluar', 'error', '❌ ' + escHtml(res.msg));
    const serialInput = document.getElementById('keluar-serial');
    if (serialInput) serialInput.value = '';
    STATE.keluar.scannedSerial = null;
    STATE.keluar.bindingData = null;
    resetKeluarUi();
    return;
  }
  if (res.status !== 'BOUND') {
    showResult('keluar', 'error', `❌ Kartu <strong>${escHtml(serial)}</strong> tidak dalam status terikat / tidak dikenal.`);
    const serialInput = document.getElementById('keluar-serial');
    if (serialInput) serialInput.value = '';
    STATE.keluar.scannedSerial = null;
    STATE.keluar.bindingData = null;
    resetKeluarUi();
    return;
  }

  STATE.keluar.bindingData = res;

  showResult('keluar', 'warning',
    `⚠️ Kartu <strong>${escHtml(serial)}</strong> terikat ke <strong>${escHtml(res.nama)}</strong>.<br>
     <span class="meta">NIK: ${escHtml(res.nik)} · ${escHtml(res.dept)} · Terikat sejak: ${escHtml(res.waktuBind)}</span><br><br>
     Konfirmasi jika karyawan ini akan pulang.`);

  document.getElementById('keluar-avatar').textContent  = res.nama.charAt(0);
  document.getElementById('keluar-nama').textContent    = res.nama;
  document.getElementById('keluar-detail').textContent  = res.nik + ' · ' + res.dept;

  document.getElementById('keluar-confirm').classList.add('visible');
}

function confirmKeluar() {
  if (REQUEST_BUSY.keluarConfirm) return;
  const serial = STATE.keluar.scannedSerial;
  if (!serial) return;
  
  const loker = (document.getElementById('keluar-loker').value || '').trim();
  
  REQUEST_BUSY.keluarConfirm = true;
  setActionBusy('confirm-keluar', true);
  showResult('keluar', 'warning', '⏳ Memproses...');
  document.getElementById('keluar-confirm').classList.remove('visible');

  google.script.run
    .withFailureHandler(err => {
      REQUEST_BUSY.keluarConfirm = false;
      setActionBusy('confirm-keluar', false);
      handleGasFailure('keluar', err);
      document.getElementById('keluar-confirm').classList.add('visible');
    })
    .withSuccessHandler(res => {
      REQUEST_BUSY.keluarConfirm = false;
      setActionBusy('confirm-keluar', false);
      if (res.ok) {
        showResult('keluar', 'success',
          `🚪 <strong>${escHtml(res.karyawan.nama)}</strong> telah keluar pabrik.<br>
           <span class="meta">Kartu ${escHtml(res.noKartuMK)} telah dilepas · ${escHtml(res.waktu)}</span>`);
        STATE.keluar = { scannedSerial:null, bindingData:null };
        document.getElementById('keluar-serial').value = '';
        resetKeluarUi();
      } else {
        showResult('keluar', 'error', '❌ ' + escHtml(res.msg));
        document.getElementById('keluar-confirm').classList.add('visible');
      }
    })
    .releaseKartu(serial, loker);
}

// ── SECURITY: Handle scan ──────────────────────────────────
function handleSecurityScan(res) {
  REQUEST_BUSY.securityScan = false;
  if (!res.ok) {
    showResult('security', 'error', `❌ ${escHtml(res.msg)}`);
    const serialInput = document.getElementById('security-serial');
    if (serialInput) serialInput.value = '';
    STATE.security.scannedSerial = null;
  } else {
    const icon  = res.inout === 'IN' ? '🟢' : '🟡';
    const color = res.inout === 'IN' ? 'success' : 'warning';
    showResult('security', color,
      `${icon} <strong>${escHtml(res.karyawan.nama)}</strong><br>
       <span class="meta">${escHtml(res.karyawan.nik)} · ${escHtml(res.karyawan.dept)} · ${escHtml(res.karyawan.jabatan)}</span><br>
       <span class="meta">Kartu: ${escHtml(res.noKartuMK)} · ${escHtml(res.waktu)}</span><br>
       <strong style="font-size:16px">${res.inout === 'IN' ? '✅ MASUK Area Kerja' : '🚪 KELUAR Area Kerja'}</strong>`);
    document.getElementById('security-serial').value = '';
    STATE.security.scannedSerial = null;
    setTimeout(loadRecentLogs, 800);
  }
}

// ── DASHBOARD ──────────────────────────────────────────────
function loadDashboard() {
  document.getElementById('db-bound').textContent      = '...';
  document.getElementById('db-log-today').textContent  = '...';
  document.getElementById('db-bound-list').innerHTML   = '<div class="skeleton-block skeleton-loader"></div><div class="skeleton-block skeleton-loader"></div>';

  google.script.run
    .withFailureHandler(err => {
      document.getElementById('db-bound').textContent = '-';
      document.getElementById('db-log-today').textContent = '-';
      document.getElementById('db-bound-list').innerHTML = `<div class="loading">Gagal memuat dashboard: ${escHtml(getErrorMessage(err))}</div>`;
    })
    .withSuccessHandler(res => {
      if (!res.ok) {
        document.getElementById('db-bound').textContent = '-';
        document.getElementById('db-log-today').textContent = '-';
        document.getElementById('db-bound-list').innerHTML = `<div class="loading">Gagal memuat dashboard: ${escHtml(res.msg)}</div>`;
        return;
      }
      document.getElementById('db-bound').textContent     = res.totalBound;
      document.getElementById('db-log-today').textContent = res.logAreaKerjaHariIni;

      const list = document.getElementById('db-bound-list');
      if (!res.boundList.length) {
        list.innerHTML = '<div class="loading">Tidak ada karyawan di dalam pabrik</div>';
        return;
      }
      list.innerHTML = res.boundList.map(k => `
        <div class="log-item">
          <div class="log-dot in" style="background:#e8f4fb">
            <span style="font-weight:800;color:#0077B6">${k.nama.charAt(0)}</span>
          </div>
          <div class="log-info">
            <strong>${escHtml(k.nama)}</strong>
            <span>${k.nik} · ${escHtml(k.dept)} · Kartu: ${k.noKartuMK}</span>
          </div>
          <div class="log-time">${k.waktuBind ? k.waktuBind.split(' ')[1] || '' : ''}</div>
        </div>`).join('');
    })
    .getDashboardData();
}

// ── RECENT LOGS ────────────────────────────────────────────
function loadRecentLogs() {
  google.script.run
    .withFailureHandler(err => {
      const el = document.getElementById('security-log-list');
      if (el) el.innerHTML = `<div class="loading">Gagal memuat log: ${escHtml(getErrorMessage(err))}</div>`;
    })
    .withSuccessHandler(res => {
      const el = document.getElementById('security-log-list');
      if (!res.ok) {
        el.innerHTML = `<div class="loading">Gagal memuat log: ${escHtml(res.msg)}</div>`;
        return;
      }
      if (!res.data.length) {
        el.innerHTML = '<div class="loading">Belum ada log hari ini</div>';
        return;
      }
      el.innerHTML = res.data.map(l => `
        <div class="log-item">
          <div class="log-dot ${l.inout === 'IN' ? 'in' : 'out'}">
            ${l.inout === 'IN' ? '🟢' : '🟡'}
          </div>
          <div class="log-info">
            <strong>${escHtml(l.nama)}</strong>
            <span>${l.noKartuMK} · ${l.nik}</span>
          </div>
          <div class="log-time">${l.jam}<br><span style="font-size:10px">${l.tanggal}</span></div>
        </div>`).join('');
    })
    .getRecentAreaLogs(20);
}

// ── HELPERS ────────────────────────────────────────────────
function updatePeriodInput(target) {
  const typeEl = document.getElementById(target + '-period-type');
  const valueEl = document.getElementById(target + '-period-value');
  if (!typeEl || !valueEl) return;

  valueEl.type = typeEl.value;
  valueEl.value = getDefaultPeriodValue(typeEl.value);
}

function getDefaultPeriodValue(type) {
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  if (type === 'date') return `${yyyy}-${mm}-${dd}`;
  if (type === 'month') return `${yyyy}-${mm}`;
  if (type === 'week') return getIsoWeekValue(now);
  return '';
}

function getIsoWeekValue(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(week).padStart(2, '0')}`;
}

function downloadTextFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.style.display = 'none';
  document.body.appendChild(link);
  link.click();
  window.setTimeout(() => {
    URL.revokeObjectURL(url);
    link.remove();
  }, 1000);
}

function normalizeSerial(value) {

}

    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.EAN_13
  ].filter(format => format !== undefined);
}

function getNativeBarcodeFormats() {

async function getCameraPermissionState() {
  if (!navigator.permissions || !navigator.permissions.query) return 'unknown';
  try {
    const status = await navigator.permissions.query({ name: 'camera' });
    return status.state || 'unknown';
  } catch(err) {
    return 'unknown';
  }
}

function getCameraPolicyState() {
  try {
    if (document.permissionsPolicy && document.permissionsPolicy.allowsFeature) {
      return document.permissionsPolicy.allowsFeature('camera') ? 'allowed' : 'blocked';
    }
    if (document.featurePolicy && document.featurePolicy.allowsFeature) {
      return document.featurePolicy.allowsFeature('camera') ? 'allowed' : 'blocked';
    }
  } catch(err) {
    return 'unknown';
  }
  return 'unknown';
}

function isTopWindow() {
  try {
    return window.self === window.top;
  } catch(err) {
    return false;
  }
}

function buildCameraDiagnostic(permissionState, policyState, mode) {
  return [
    'Mode: ' + mode,
    'Permission: ' + permissionState,
    'Policy: ' + policyState,
    'HTTPS: ' + (window.isSecureContext ? 'yes' : 'no'),
    'Top frame: ' + (isTopWindow() ? 'yes' : 'no'),
    'getUserMedia: ' + (navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? 'available' : 'missing')
  ].join(' | ');
}

function normalizeCameraError(err) {
  const rawMessage = err && (err.message || err.name || String(err));
  const message = rawMessage || 'Browser belum memberi akses kamera.';

  if (err && err.code === 'CAMERA_POLICY_BLOCKED') {
    return {
      title: 'Akses kamera diblokir browser',
      msg: 'Browser memblokir kamera untuk konteks halaman ini sebelum prompt izin bisa muncul. Buka URL web app hasil deployment /exec langsung di Chrome, bukan preview editor, lalu coba SCAN QR lagi.'
    };
  }

  if (err && err.code === 'CAMERA_PERMISSION_DENIED_STICKY') {
    return {
      title: 'Izin kamera sudah ditolak',
      msg: 'Browser sudah menyimpan status kamera sebagai Block/Deny untuk halaman ini, jadi prompt tidak akan muncul lagi. Reset izin dari ikon gembok di address bar atau Site settings > Camera > Allow, lalu muat ulang aplikasi.'
    };
  }

  if (err && err.code === 'INSECURE_CONTEXT') {
    return {
      title: 'Kamera butuh HTTPS',
      msg: 'Browser hanya membuka kamera pada halaman HTTPS yang aman. Gunakan URL deployment Apps Script yang diawali https://script.google.com/.../exec.'
    };
  }

  if (err && err.code === 'NO_BARCODE_DETECTOR') {
    return {
      title: 'Scanner native tidak tersedia',
      msg: 'Browser ini tidak menyediakan BarcodeDetector. Fallback scanner akan dicoba otomatis.'
    };
  }

  if (/notallowed|permission|denied|izin/i.test(message)) {
    return {
      title: 'Izin kamera belum aktif',
      msg: 'Browser menolak akses kamera. Jika prompt tidak muncul, reset izin kamera dari ikon gembok di address bar atau Site settings > Camera > Allow, lalu muat ulang aplikasi.'
    };
  }

  if (/notfound|devicesnotfound|no camera/i.test(message)) {
    return {
      title: 'Kamera tidak ditemukan',
      msg: 'Perangkat tidak mengembalikan kamera yang bisa dipakai oleh browser.'
    };
  }

  if (/notreadable|trackstart|in use|busy/i.test(message)) {
    return {
      title: 'Kamera sedang dipakai',
      msg: 'Tutup aplikasi lain yang memakai kamera, lalu klik SCAN QR lagi.'
    };
  }

  return {
    title: 'Kamera gagal dibuka',
    msg: message + '\n\nKlik SCAN QR lagi dan pilih Izinkan/Allow jika prompt kamera muncul.'
  };
}

function requestNativeCameraStream() {
  if (!window.isSecureContext) {
    const err = new Error('Halaman bukan secure context.');
    err.code = 'INSECURE_CONTEXT';
    throw err;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    throw new Error('Browser tidak menyediakan akses kamera.');
  }
  return navigator.mediaDevices.getUserMedia({
    audio: false,
    video: {
      facingMode: { ideal: 'environment' },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  });
}

async function startNativeCameraScanner(stream) {
  if (typeof BarcodeDetector === 'undefined') {
    const err = new Error('BarcodeDetector tidak tersedia.');
    err.code = 'NO_BARCODE_DETECTOR';
    throw err;
  }

  const reader = document.getElementById('qr-reader');

  // Native live scanner belum dipakai pada flow aktif.
  // Jika fungsi ini terpanggil, hentikan stream agar kamera tidak menggantung.
  if (!reader && stream && stream.getTracks) {
    stream.getTracks().forEach(track => track.stop());
    return;
  }

  if (stream && stream.getTracks) {
    stream.getTracks().forEach(track => track.stop());
  }
}

async function processQRImage(event, context) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;

  const resultContainer = document.getElementById(context + '-result');
  
  resetSerialInput(context);
  if (resultContainer) {
    resultContainer.className = 'result-card warning';
    resultContainer.innerHTML = '<strong>⏳ Sedang menganalisis foto...</strong>';
    resultContainer.style.display = 'block';
  }

  let decodedText = null;

  try {
    // 1) Coba Native BarcodeDetector (sangat cepat & akurat di iOS 17+ dan Android Chrome)
    if (typeof BarcodeDetector !== 'undefined') {
      try {
        const detector = new BarcodeDetector();
        const img = new Image();
        const url = URL.createObjectURL(file);
        await new Promise((res, rej) => { img.onload = res; img.onerror = rej; img.src = url; });
        const barcodes = await detector.detect(img);
        URL.revokeObjectURL(url);
        if (barcodes && barcodes.length > 0) {
          decodedText = barcodes[0].rawValue;
        }
      } catch(e) {
        console.warn('Native BarcodeDetector failed', e);
      }
    }

    // 2) Fallback ke html5-qrcode
    if (!decodedText) {
      if (typeof Html5Qrcode === 'undefined') throw new Error('Library html5-qrcode belum termuat.');
      
      let dummyReader = document.getElementById('dummy-qr-reader');
      if (!dummyReader) {
        dummyReader = document.createElement('div');
        dummyReader.id = 'dummy-qr-reader';
        dummyReader.style.display = 'none';
        document.body.appendChild(dummyReader);
      }

      if (!QR.html5QrCode) {
        const formats = getScannerFormats();
        QR.html5QrCode = new Html5Qrcode('dummy-qr-reader', formats ? { formatsToSupport: formats } : undefined);
      }
      
      decodedText = await QR.html5QrCode.scanFile(file, true);
    }
    
    event.target.value = ''; 
    
    const serial = normalizeSerial(decodedText);
    if (!serial || !isValidSerial(serial)) {
      if (resultContainer) {
        resultContainer.className = 'result-card error';
        resultContainer.innerHTML = '<strong>Kode terbaca:</strong> ' + decodedText + '<br>Tetapi format bukan kartu MK / NIK.';
      }
      return;
    }
    
    indicateScanSuccess();
    document.getElementById(context + '-serial').value = serial;
    if (resultContainer) {
      resultContainer.className = 'result-card';
      resultContainer.innerHTML = '✅ Ditemukan: ' + serial;
    }
    
    onSerialScanned(context, serial);

  } catch(err) {
    event.target.value = '';
    if (resultContainer) {
      resultContainer.className = 'result-card error';
      resultContainer.innerHTML = '<strong>Gagal:</strong> Barcode tidak terbaca dari foto (hindari silau/blur).<br><span style="color:#d9534f;font-weight:600;">👉 Silakan ketik NIK / MK secara manual di kotak bawah lalu klik SCAN.</span>';
    }
  }
}

function bindUiEvents() {
  const logo = document.getElementById('dam-logo');
  if (logo) logo.addEventListener('error', () => { logo.style.display = 'none'; });

  const btnHamburger = document.getElementById('btn-hamburger');
  const overlay = document.getElementById('sidebar-overlay');
  const tabbar = document.getElementById('app-tabbar');

  if (btnHamburger) {
    btnHamburger.addEventListener('click', () => {
      if(tabbar) tabbar.classList.toggle('open');
      if(overlay) overlay.classList.toggle('active');
    });
  }

  if (overlay) {
    overlay.addEventListener('click', () => {
      if(tabbar) tabbar.classList.remove('open');
      if(overlay) overlay.classList.remove('active');
    });
  }

  document.addEventListener('click', event => {
    const control = event.target.closest('[data-action]');
    if (!control) return;

    const action = control.dataset.action;
    const context = control.dataset.context;
    
    if (action === 'submit-login') handleLoginSubmit();
    if (action === 'submit-logout') handleLogout();
    if (action === 'switch-tab') switchTab(control.dataset.tab);

    if (action === 'submit-serial') submitSerial(context);
    if (action === 'confirm-masuk') confirmMasuk();
    if (action === 'confirm-keluar') confirmKeluar();
    if (action === 'load-dashboard') loadDashboard();
    if (action === 'process-absen-report') processAbsenReport();
    if (action === 'export-absen-report') exportAbsenReport();
    if (action === 'process-area-report') processAreaReport();
  });

  document.addEventListener('input', event => {
    if (event.target.dataset.action !== 'search-karyawan') return;
    debounceSearch(event.target.value, event.target.dataset.context);
  });

  document.addEventListener('change', event => {
    if (event.target.dataset.action !== 'period-type') return;
    updatePeriodInput(event.target.dataset.target);
  });

  document.addEventListener('keydown', event => {
    const action = event.target.dataset.action;
    const context = event.target.dataset.context;

    if (event.key === 'Enter' && event.target.matches('input[id$="-serial"]')) {
      event.preventDefault();
      submitSerial(event.target.id.replace('-serial', ''));
    }
    if (event.key === 'Enter' && (event.target.id === 'login-nik' || event.target.id === 'login-password')) {
      event.preventDefault();
      handleLoginSubmit();
    }
    if (event.key === 'Enter' && event.target.id === 'cek-absen-nik') {
      event.preventDefault();
      processAbsenReport();
    }
    if (event.key === 'Enter' && event.target.id === 'cek-area-nik') {
      event.preventDefault();
      processAreaReport();
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {

  bindUiEvents();
  updatePeriodInput('cek-absen');
  updatePeriodInput('cek-area');
  // Ensure all serial inputs start STRICTLY EMPTY
  resetAllSerialInputs();
  forceClearSerialInputs();
  window.setTimeout(forceClearSerialInputs, 0);
  // Clear any stale result cards
  ['masuk', 'keluar', 'security'].forEach(ctx => {
    const el = document.getElementById(ctx + '-result');
    if (el) { el.className = 'result-card'; el.innerHTML = ''; }
  });
  // Reset masuk state
  STATE.masuk = { selectedNIK:null, selectedNama:null, selectedDept:null, selectedJabatan:null, scannedSerial:null };
  STATE.keluar = { scannedSerial:null, bindingData:null };
  STATE.security = { scannedSerial:null };
  loadRecentLogs();

  const savedSession = localStorage.getItem('dam_session');
  if (savedSession) {
    try {
      const user = JSON.parse(savedSession);
      STATE.currentUser = user;
      STATE.masuk.selectedNIK = user.nik;
      STATE.masuk.selectedNama = user.nama;
      STATE.masuk.selectedDept = user.dept;
      STATE.masuk.selectedJabatan = user.jabatan;
      
      const inNik = document.getElementById('masuk-nik');
      const inNama = document.getElementById('masuk-nama-input');
      if (inNik) inNik.value = user.nik;
      if (inNama) inNama.value = user.nama;

      applyRolePermissions(user.role);
      updateMasukScannerVisibility();
    } catch (e) {
      localStorage.removeItem('dam_session');
    }
  }
});

window.addEventListener('pageshow', () => {
  resetAllSerialInputs();
  forceClearSerialInputs();
  window.setTimeout(forceClearSerialInputs, 0);
});

// Close autocomplete on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) {
    document.querySelectorAll('.autocomplete-list').forEach(l => l.style.display='none');
  }
});

function handleLogout() {
  localStorage.removeItem('dam_session');
  STATE.currentUser = null;
  resetAllSerialInputs();
  
  document.getElementById('app-header').style.display = 'none';
  document.getElementById('app-tabbar').style.display = 'none';
  
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-login').style.display = 'flex';
  document.getElementById('page-login').classList.add('active');
  
  const loginNik = document.getElementById('login-nik');
  const loginPwd = document.getElementById('login-password');
  if(loginNik) loginNik.value = '';
  if(loginPwd) loginPwd.value = '';
}
</script>
