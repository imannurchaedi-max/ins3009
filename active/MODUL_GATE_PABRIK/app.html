<!-- html5-qrcode CDN -->
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

<div class="qr-overlay" id="qr-overlay" role="dialog" aria-modal="true" aria-labelledby="qr-title">
  <div class="qr-header">
    <h3 id="qr-title">Scan QR / Barcode</h3>
    <p>Arahkan kamera ke QR Code atau Barcode kartu MK / NIK</p>
  </div>
  <div class="qr-viewport">
    <div id="qr-reader"></div>
  </div>
  <div class="qr-result-text" id="qr-result-text"></div>
  <div class="qr-loading" id="qr-loading"></div>
  <div class="qr-diagnostic" id="qr-diagnostic"></div>
  
  <input type="file" id="qr-fallback-input" accept="image/*" capture="environment" style="display:none;" onchange="handleFallbackImage(event)">
  <button class="qr-close-btn" id="qr-fallback-btn" type="button" style="background:#0077b6; margin-bottom:10px; display:none;" onclick="document.getElementById('qr-fallback-input').click()">📸 AMBIL FOTO</button>
  <button class="qr-close-btn" id="qr-close-btn" data-action="close-qr" type="button">TUTUP</button>
</div>

<div class="scan-toast" id="scan-toast" role="status" aria-live="polite"></div>

<script>
// ── QR Scanner State ──────────────────────────────────────
const QR = {
  html5QrCode: null,
  stream: null,
  video: null,
  detector: null,
  scanFrame: null,
  isScanning: false,
  isStarting: false,
  isStopping: false,
  context: null,
  usingNative: false,
  successHandled: false,
  tesseractLoader: null
};

// ── State ──────────────────────────────────────────────────
const STATE = {
  currentUser: null,
  masuk:    { selectedNIK: null, selectedNama: null, selectedType: null, selectedDept: null, selectedJabatan: null, scannedSerial: null, completed: false },
  keluar:   { scannedSerial: null, bindingData: null },
  security: { scannedSerial: null }
};

const REQUEST_BUSY = {
  masukConfirm: false,
  keluarScan: false,
  keluarConfirm: false,
  securityScan: false
};

const REPORT_CACHE = {
  absen: null
};

function getIncomingSessionNik() {
  if (typeof GLOBAL_SESSION_NIK === 'undefined') return '';
  return String(GLOBAL_SESSION_NIK || '').trim();
}

function setLoginUiMode(mode, message) {
  const loginPage = document.getElementById('page-login');
  const loginForm = document.getElementById('login-form-content');
  const sessionBootstrap = document.getElementById('session-bootstrap');
  if (!loginPage || !loginForm || !sessionBootstrap) return;

  if (mode === 'bootstrapping') {
    loginPage.style.display = 'flex';
    loginPage.classList.add('active');
    loginForm.style.display = 'none';
    sessionBootstrap.style.display = 'block';
    sessionBootstrap.textContent = message || 'Memuat sesi dari Home Portal...';
    return;
  }

  sessionBootstrap.style.display = 'none';
  loginForm.style.display = 'block';
  loginPage.style.display = 'flex';
  loginPage.classList.add('active');
}

function hydrateAuthenticatedUser(user, depts) {
  STATE.currentUser = user;
  if (Array.isArray(depts) && depts.length) STATE.availableDepts = depts;

  localStorage.setItem('dam_session', JSON.stringify(user));



  STATE.masuk.selectedNIK = user.nik;
  STATE.masuk.selectedNama = user.nama;
  STATE.masuk.selectedType = user.type;
  STATE.masuk.selectedDept = user.dept;
  STATE.masuk.selectedJabatan = user.jabatan;
  STATE.masuk.completed = false;

  const inNik = document.getElementById('masuk-nik');
  const inNama = document.getElementById('masuk-nama-input');
  const inDept = document.getElementById('masuk-dept');
  const inJabatan = document.getElementById('masuk-jabatan');
  if (inNik) inNik.value = user.nik;
  if (inNama) inNama.value = user.nama;
  if (inDept) inDept.value = user.dept || '';
  if (inJabatan) inJabatan.value = user.jabatan || '';

  applyRolePermissions(user.role);
  updateMasukScannerVisibility();
}

function restoreSavedSession() {
  const savedSession = localStorage.getItem('dam_session');
  if (!savedSession) return false;

  try {
    const user = JSON.parse(savedSession);
    hydrateAuthenticatedUser(user, STATE.availableDepts);
    return true;
  } catch (e) {
    localStorage.removeItem('dam_session');
    return false;
  }
}

function beginModuleAutoLogin(sessionNik) {
  const nik = (sessionNik || getIncomingSessionNik()).trim();
  if (!nik) return false;

  STATE.authBootPending = true;
  setLoginUiMode('bootstrapping', 'Memuat sesi dari Home Portal...');

  google.script.run
    .withFailureHandler(err => {
      STATE.authBootPending = false;
      if (!restoreSavedSession()) {
        setLoginUiMode('login');
        showScanToast('Gagal memverifikasi sesi: ' + getErrorMessage(err));
      }
    })
    .withSuccessHandler(res => {
      STATE.authBootPending = false;
      if (res && res.ok) {
        applyAuthenticatedSession(res);
      } else if (!restoreSavedSession()) {
        setLoginUiMode('login');
        showScanToast((res && res.msg) || 'Sesi tidak valid.');
      }
    })
    .verifySession(nik);

  return true;
}

// ── AUTHENTICATION ─────────────────────────────────────────
function applyRolePermissions(role) {
  const TABS = {
    'masuk': ['ADMINISTRATOR', 'SECURITY', 'KARYAWAN'],
    'keluar': ['ADMINISTRATOR', 'SECURITY', 'KARYAWAN'],
    'security': ['SECURITY', 'PENGAWAS'], 
    'dashboard': ['ADMINISTRATOR', 'PENGAWAS'],
    'cek-absen': ['ADMINISTRATOR', 'PENGAWAS', 'SECURITY', 'KARYAWAN'],
    'cek-area': ['ADMINISTRATOR', 'PENGAWAS', 'SECURITY'],
    'export-laporan': ['ADMINISTRATOR'],
    'revisi-catatan': ['ADMINISTRATOR']
  };

  let defaultTab = null;
  const validRoles = ['ADMINISTRATOR', 'PENGAWAS', 'SECURITY'];
  const roleKey = validRoles.includes(role) ? role : 'KARYAWAN';

  // Default tabs
  if (roleKey === 'ADMINISTRATOR') defaultTab = 'dashboard';
  else if (roleKey === 'PENGAWAS') defaultTab = 'cek-absen';
  else if (roleKey === 'SECURITY') defaultTab = 'security';
  else defaultTab = 'masuk';

  for (const tab in TABS) {
    const btn = document.getElementById('tab-btn-' + tab);
    if (TABS[tab].includes(roleKey)) {
      if (btn) btn.style.display = 'flex';
    } else {
      if (btn) btn.style.display = 'none';
    }
  }

  const userNameEl = document.getElementById('header-user-name');
  if (userNameEl && STATE.currentUser) {
    const firstName = (STATE.currentUser.nama || 'User').split(' ')[0];
    userNameEl.textContent = firstName + ' (' + roleKey + ')';
    
    const absenNik = document.getElementById('cek-absen-nik');
    if (absenNik && roleKey === 'KARYAWAN') {
      absenNik.value = STATE.currentUser.nik;
      absenNik.disabled = true;
    }
    
    const masukSearch = document.getElementById('masuk-nik-input');
    if (masukSearch) {
      if (roleKey === 'KARYAWAN') {
         masukSearch.disabled = true;
         masukSearch.placeholder = "Pencarian dinonaktifkan khusus Karyawan";
         masukSearch.style.backgroundColor = "#e9ecef";
      } else {
         masukSearch.disabled = false;
         masukSearch.placeholder = "Masukkan NIK atau biarkan kosong";
         masukSearch.style.backgroundColor = "";
      }
    }
  }

  // Switch to default tab
  if (defaultTab) switchTab(defaultTab);
  
  // Show header and tab bar
  document.getElementById('app-header').style.display = 'flex';
  document.getElementById('app-tabbar').style.display = 'flex';
  
  // Hide login page
  document.getElementById('page-login').classList.remove('active');
  document.getElementById('page-login').style.display = 'none';
}

function handleLoginSubmit() {
  const nik = (document.getElementById('login-nik').value || '').trim();
  const pwd = (document.getElementById('login-password').value || '').trim();
  
  if (!nik) {
    showScanToast("NIK wajib diisi.");
    return;
  }
  
  const btn = document.querySelector('.btn-login');
  btn.classList.add('pulse-anim');
  btn.innerHTML = 'MASUK...';
  btn.disabled = true;
  
  google.script.run
    .withFailureHandler(err => {
      btn.disabled = false;
      btn.classList.remove('pulse-anim');
      btn.innerHTML = 'MASUK';
      showScanToast('Error koneksi: ' + err.message);
    })
    .withSuccessHandler(res => {
      btn.disabled = false;
      btn.classList.remove('pulse-anim');
      btn.innerHTML = 'MASUK';
      if (!res.ok) {
        showScanToast(res.msg);
        return;
      }
      applyAuthenticatedSession(res);
    })
    .verifyLogin(nik, pwd);
}

function applyAuthenticatedSession(res) {
  hydrateAuthenticatedUser(res.karyawan, res.depts);
}

// ── Tab switching ──────────────────────────────────────────
async function switchTab(tab) {
  const tabbar = document.getElementById('app-tabbar');
  const overlay = document.getElementById('sidebar-overlay');
  if (tabbar) tabbar.classList.remove('open');
  if (overlay) overlay.classList.remove('active');

  if (typeof QR !== 'undefined' && (QR.isScanning || QR.isStarting)) {
    if (typeof stopQRScanner === 'function') await stopQRScanner();
  }

  const token = '?nik=' + (STATE.currentUser ? STATE.currentUser.nik : '');
  
  google.script.run.withSuccessHandler(urls => {
    let targetUrl = '';
    let isLocal = false;

    if (tab === 'dashboard') {
      if (document.getElementById('page-dashboard')) isLocal = true;
      else targetUrl = urls.HOME_PORTAL;
    } 
    else if (tab === 'masuk' || tab === 'keluar') {
      if (document.getElementById('page-masuk')) isLocal = true;
      else targetUrl = urls.GATE_PABRIK;
    }
    else if (tab === 'security') {
      if (document.getElementById('page-security')) isLocal = true;
      else targetUrl = urls.AREA_KERJA;
    }
    else if (tab.includes('cek') || tab.includes('export')) {
      targetUrl = urls.REPORT;
    }

    if (isLocal) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      
      const pageId = 'page-' + tab;
      const btnId = 'tab-btn-' + tab;
      if (document.getElementById(pageId)) document.getElementById(pageId).classList.add('active');
      if (document.getElementById(btnId)) document.getElementById(btnId).classList.add('active');
      
      if (typeof resetAllSerialInputs === 'function') resetAllSerialInputs();
      
      const contexts = ['masuk', 'keluar', 'security'];
      contexts.forEach(ctx => {
        const resultEl = document.getElementById(ctx + '-result');
        if (resultEl) { resultEl.className = 'result-card'; resultEl.innerHTML = ''; }
      });

      if (tab === 'dashboard' && typeof loadDashboard === 'function') loadDashboard();
      if (tab === 'security' && typeof loadRecentLogs === 'function') loadRecentLogs();
      if ((tab === 'cek-absen' || tab === 'cek-area') && typeof updatePeriodInput === 'function') updatePeriodInput();
    } 
    else if (targetUrl) {
      window.top.location.href = targetUrl + token;
    } 
    else {
      alert('URL Module belum dikonfigurasi di CONFIG_MODUL!');
    }
  }).getModuleUrls();
}

// ── Debounce search ────────────────────────────────────────
let searchTimer = null;
function debounceSearch(q, context) {
  clearTimeout(searchTimer);
  if (q.length < 2) { closeList(context); return; }
  searchTimer = setTimeout(() => doSearch(q, context), 400);
}

function doSearch(q, context) {
  google.script.run
    .withFailureHandler(err => handleGasFailure(context, err))
    .withSuccessHandler(res => renderList(res, context))
    .searchKaryawan(q);
}

function renderList(res, context) {
  const list = document.getElementById(context + '-list');
  if (!list) return;
  list.innerHTML = '';
  if (!res.ok) { showResult(context, 'error', 'Gagal mencari karyawan: ' + escHtml(res.msg)); return; }
  if (!res.data.length) { list.style.display='none'; return; }

  res.data.forEach(k => {
    const item = document.createElement('div');
    const name = document.createElement('div');
    const detail = document.createElement('div');
    item.className = 'autocomplete-item';
    name.textContent = k.nama || '-';
    detail.className = 'item-nik';
    detail.textContent = `${k.nik || '-'} - ${k.dept || '-'} - ${k.jabatan || '-'}`;
    item.addEventListener('click', () => selectKaryawan(context, k.nik || '', k.nama || '', k.type || '', k.dept || '', k.jabatan || ''));
    item.appendChild(name);
    item.appendChild(detail);
    list.appendChild(item);
  });
  list.style.display = 'block';
}

function closeList(context) {
  const el = document.getElementById(context + '-list');
  if (el) el.style.display = 'none';
}

function selectKaryawan(context, nik, nama, type, dept, jabatan) {
  STATE[context].selectedNIK     = nik;
  STATE[context].selectedNama    = nama;
  STATE[context].selectedType    = type;
  STATE[context].selectedDept    = dept;
  STATE[context].selectedJabatan = jabatan;
  if (context === 'masuk') STATE.masuk.completed = false;

  const searchInput = document.getElementById(context + '-search') || document.getElementById(context + '-nik-input');
  if (searchInput) searchInput.value = nama + ' (' + nik + ')';
  const nikInput = document.getElementById(context + '-nik');
  const namaInput = document.getElementById(context + '-nama-input');
  const deptInput = document.getElementById(context + '-dept');
  const jabatanInput = document.getElementById(context + '-jabatan');
  if (nikInput) nikInput.value = nik;
  if (namaInput) namaInput.value = nama;
  if (deptInput) deptInput.value = dept || '';
  if (jabatanInput) jabatanInput.value = jabatan || '';
  closeList(context);

  const info = document.getElementById(context + '-karyawan-info');
  if (info) {
    document.getElementById(context + '-avatar').textContent = nama.charAt(0);
    document.getElementById(context + '-nama').textContent   = nama;
    document.getElementById(context + '-detail').textContent = nik + ' - ' + dept + ' - ' + jabatan;
    document.getElementById(context + '-type').textContent   = type || 'KARYAWAN';
    info.style.display = 'block';
  }

  updateMasukScannerVisibility();
}

// ── Manual serial submit ────────────────────────────────────
function submitSerial(context) {
  const val = normalizeSerial(document.getElementById(context + '-serial').value);
  if (!val) { showResult(context, 'error', 'Masukkan nomor kartu MK / NIK terlebih dahulu.'); return; }
  if (!isValidSerial(val)) { showResult(context, 'error', 'Format nomor kartu MK / NIK tidak valid.'); return; }
  onSerialScanned(context, val);
}

// ── On serial received (NFC or manual) ────────────────────
function onSerialScanned(context, serial) {
  serial = normalizeSerial(serial);
  if (!isValidSerial(serial)) {
    showResult(context, 'error', 'Format nomor kartu MK / NIK tidak valid.');
    return;
  }
  document.getElementById(context + '-serial').value = serial;

  if (context === 'masuk') {
    STATE.masuk.completed = false;
    STATE.masuk.scannedSerial = serial;
    const display = document.getElementById('masuk-card-display');
    document.getElementById('masuk-card-num').textContent = serial;
    display.style.display = 'block';
    setRescanVisibility('masuk', true);
    showResult('masuk', 'warning', `Kartu <strong>${escHtml(serial)}</strong> sudah terbaca. Periksa dulu, lalu pilih <strong>KONFIRMASI MASUK PABRIK</strong> atau <strong>SCAN ULANG KARTU</strong> jika salah scan.`);
    checkMasukReady();

  } else if (context === 'keluar') {
    if (REQUEST_BUSY.keluarScan) return;
    REQUEST_BUSY.keluarScan = true;
    STATE.keluar.scannedSerial = serial;
    setRescanVisibility('keluar', true);
    showResult('keluar', 'warning', 'Memeriksa kartu...');
    google.script.run
      .withFailureHandler(err => {
        REQUEST_BUSY.keluarScan = false;
        handleGasFailure('keluar', err);
      })
      .withSuccessHandler(res => handleKeluarScan(res, serial))
      .getBindingStatus(serial);

  } else if (context === 'security') {
    const dept = '';
    
    const reasonRadio = document.querySelector('input[name="security_reason"]:checked');
    const reason = reasonRadio ? reasonRadio.value : '';
    
    const modeRadio = document.querySelector('input[name="security_mode"]:checked');
    const forceMode = modeRadio ? modeRadio.value : 'AUTO';
    
    if (REQUEST_BUSY.securityScan) return;
    REQUEST_BUSY.securityScan = true;
    STATE.security.scannedSerial = serial;
    showResult('security', 'warning', 'Mencatat...');
    google.script.run
      .withFailureHandler(err => {
        REQUEST_BUSY.securityScan = false;
        handleGasFailure('security', err);
      })
      .withSuccessHandler(handleSecurityScan)
      .scanAreaKerja(serial, dept, reason, forceMode);
  }
}

// ── MASUK: Check ready & confirm ───────────────────────────
function isExternalUser(type, jabatan, dept) {
  const marker = [type, jabatan, dept].join(' ').toUpperCase();
  return ['MITRA', 'VISITOR', 'TAMU', 'EXTERNAL', 'EKSTERNAL', 'VENDOR', 'KONTRAKTOR', 'OUTSOURCE', 'OUTSOURCING']
    .some(keyword => marker.includes(keyword));
}

function isInternalUser(type, jabatan, dept) {
  return !isExternalUser(type, jabatan, dept);
}

function updateMasukScannerVisibility() {
  const s = STATE.masuk;
  const card = document.getElementById('masuk-scanner-card');
  if (card) {
    const isInternal = isInternalUser(s.selectedType, s.selectedJabatan, s.selectedDept);
    card.style.display = isInternal ? 'none' : 'block';
  }
  checkMasukReady();
}

function checkMasukReady() {
  const s = STATE.masuk;
  const btn = document.getElementById('masuk-confirm');
  if (!btn) return;
  const internal = isInternalUser(s.selectedType, s.selectedJabatan, s.selectedDept);
  if (!s.completed && s.selectedNIK && (internal || s.scannedSerial)) {
    btn.classList.add('visible');
  } else {
    btn.classList.remove('visible');
  }
}

function confirmMasuk() {
  if (REQUEST_BUSY.masukConfirm) return;
  const s = STATE.masuk;
  const internal = isInternalUser(s.selectedType, s.selectedJabatan, s.selectedDept);
  
  if (!s.selectedNIK) return;
  if (!internal && !s.scannedSerial) return;

  const loker = (document.getElementById('masuk-loker').value || '').trim();
  const serialToSend = internal ? s.selectedNIK : s.scannedSerial;

  REQUEST_BUSY.masukConfirm = true;
  setActionBusy('confirm-masuk', true);
  showResult('masuk', 'warning', 'Memproses...');
  document.getElementById('masuk-confirm').classList.remove('visible');

  google.script.run
    .withFailureHandler(err => {
      REQUEST_BUSY.masukConfirm = false;
      setActionBusy('confirm-masuk', false);
      handleGasFailure('masuk', err);
      document.getElementById('masuk-confirm').classList.add('visible');
    })
    .withSuccessHandler(res => {
      REQUEST_BUSY.masukConfirm = false;
      setActionBusy('confirm-masuk', false);
      if (res.ok) {
        showResult('masuk', 'success',
          `<strong>${escHtml(res.karyawan.nama)}</strong> berhasil masuk pabrik.<br>
           <span class="meta">Kartu: ${escHtml(res.noKartuMK)} - ${escHtml(res.waktu)} - ${escHtml(res.shift)}</span>`);
        resetMasuk();
      } else {
        if (res.htmlMsg) {
          showResult('masuk', 'error', res.htmlMsg);
        } else {
          showResult('masuk', 'error', escHtml(res.msg));
        }
        document.getElementById('masuk-confirm').classList.add('visible');
      }
    })
    .bindKartu(serialToSend, s.selectedNIK, loker);
}

window.forceReleaseOldCard = function(oldKartu) {
  if (!confirm(`Yakin ingin me-release (membebaskan) kartu ${oldKartu} secara paksa?`)) return;
  
  showResult('masuk', 'warning', `Mencoba me-release paksa kartu ${oldKartu}...`);
  document.getElementById('masuk-confirm').classList.remove('visible');
  
  google.script.run
    .withFailureHandler(err => {
      showResult('masuk', 'error', 'Gagal release paksa: ' + escHtml(getErrorMessage(err)));
    })
    .withSuccessHandler(res => {
      if (res.ok) {
        showResult('masuk', 'success', `✅ Kartu ${oldKartu} berhasil dilepas secara paksa.<br>Silakan klik <strong>KONFIRMASI MASUK PABRIK</strong> kembali untuk mengikat kartu baru.`);
        document.getElementById('masuk-confirm').classList.add('visible');
      } else {
        showResult('masuk', 'error', 'Gagal: ' + escHtml(res.msg));
      }
    })
    .releaseKartu(oldKartu, 'FORCE_RELEASE');
};

// Override legacy force-release flow: kartu lama hanya boleh dilepas oleh security
window.forceReleaseOldCard = function(oldKartu) {
  showResult(
    'masuk',
    'warning',
    `Release mandiri untuk kartu <strong>${escHtml(oldKartu)}</strong> dinonaktifkan. Datang ke <strong>Security</strong> dan minta petugas scan kartu MK fisik untuk melepas binding.`
  );
  document.getElementById('masuk-confirm').classList.remove('visible');
};

function resetMasuk() {
  STATE.masuk.scannedSerial = null;
  STATE.masuk.completed = true;
  const serialIn = document.getElementById('masuk-serial');
  if (serialIn) serialIn.value = '';
  const lokerIn = document.getElementById('masuk-loker');
  if (lokerIn) lokerIn.value = '';
  const confirmBtn = document.getElementById('masuk-confirm');
  if (confirmBtn) confirmBtn.classList.remove('visible');
  setRescanVisibility('masuk', false);
  updateMasukScannerVisibility();
}

function resetKeluarUi() {
  const confirmEl = document.getElementById('keluar-confirm');
  if (confirmEl) confirmEl.classList.remove('visible');

  const avatar = document.getElementById('keluar-avatar');
  const nama = document.getElementById('keluar-nama');
  const detail = document.getElementById('keluar-detail');

  if (avatar) avatar.textContent = '?';
  if (nama) nama.textContent = '-';
  if (detail) detail.textContent = '-';
  
  const lokerIn = document.getElementById('keluar-loker');
  if (lokerIn) lokerIn.value = '';
  setRescanVisibility('keluar', false);
}

// ── KELUAR: Handle scan & confirm ──────────────────────────
function handleKeluarScan(res, serial) {
  REQUEST_BUSY.keluarScan = false;
  if (!res.ok) {
    showResult('keluar', 'error', escHtml(res.msg));
    const serialInput = document.getElementById('keluar-serial');
    if (serialInput) serialInput.value = '';
    STATE.keluar.scannedSerial = null;
    STATE.keluar.bindingData = null;
    resetKeluarUi();
    return;
  }
  if (res.status !== 'BOUND') {
    showResult('keluar', 'error', `Kartu <strong>${escHtml(serial)}</strong> tidak dalam status terikat / tidak dikenal.`);
    const serialInput = document.getElementById('keluar-serial');
    if (serialInput) serialInput.value = '';
    STATE.keluar.scannedSerial = null;
    STATE.keluar.bindingData = null;
    resetKeluarUi();
    return;
  }

  STATE.keluar.bindingData = res;

  showResult('keluar', 'warning',
    `Kartu <strong>${escHtml(serial)}</strong> terikat ke <strong>${escHtml(res.nama)}</strong>.<br>
     <span class="meta">NIK: ${escHtml(res.nik)} - ${escHtml(res.dept)} - Terikat sejak: ${escHtml(res.waktuBind)}</span><br><br>
     Konfirmasi jika karyawan ini akan pulang, atau pilih <strong>SCAN ULANG KARTU</strong> jika salah scan.`);

  document.getElementById('keluar-avatar').textContent  = res.nama.charAt(0);
  document.getElementById('keluar-nama').textContent    = res.nama;
  document.getElementById('keluar-detail').textContent  = res.nik + ' - ' + res.dept;

  document.getElementById('keluar-confirm').classList.add('visible');
}

function confirmKeluar() {
  if (REQUEST_BUSY.keluarConfirm) return;
  const serial = STATE.keluar.scannedSerial;
  if (!serial) return;
  
  const loker = (document.getElementById('keluar-loker').value || '').trim();
  
  REQUEST_BUSY.keluarConfirm = true;

function updatePeriodInput(target) {
  const typeEl = document.getElementById(target + '-period-type');
  const valueEl = document.getElementById(target + '-period-value');
  if (!typeEl || !valueEl) return;

  valueEl.type = typeEl.value;
  valueEl.value = getDefaultPeriodValue(typeEl.value);
}

function getDefaultPeriodValue(type) {
  const now = new Date();
  const yyyy = now.getFullYear();
  const mm = String(now.getMonth() + 1).padStart(2, '0');
  const dd = String(now.getDate()).padStart(2, '0');
  if (type === 'date') return `${yyyy}-${mm}-${dd}`;
  if (type === 'month') return `${yyyy}-${mm}`;
  if (type === 'week') return getIsoWeekValue(now);
  return '';
}

function getIsoWeekValue(date) {
  const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
  const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return `${d.getUTCFullYear()}-W${String(week).padStart(2, '0')}`;
}

function csvCell(value) {
  const text = (value === null || value === undefined) ? '' : String(value);
  return '"' + text.replace(/"/g, '""') + '"';
}

function downloadTextFile(filename, content, mimeType) {
  const blob = new Blob([content], { type: mimeType });
  const url = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = url;
  link.download = filename;
  link.style.display = 'none';
  document.body.appendChild(link);
  link.click();
  window.setTimeout(() => {
    URL.revokeObjectURL(url);
    link.remove();
  }, 1000);
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function getErrorMessage(err) {

}

function handleGasFailure(context, err) {

function setActionBusy(action, isBusy) {
  document.querySelectorAll(`[data-action="${action}"]`).forEach(el => {
    el.disabled = isBusy;
    el.setAttribute('aria-busy', isBusy ? 'true' : 'false');
    if (isBusy) {
      if (!el.dataset.originalHtml) el.dataset.originalHtml = el.innerHTML;
      el.classList.add('pulse-anim');
      el.innerHTML = 'Memproses...';
    } else {
      el.classList.remove('pulse-anim');
      if (el.dataset.originalHtml) el.innerHTML = el.dataset.originalHtml;
    }
  });
}

function normalizeSerial(value) {

function isValidSerial(value) {

}

function setRescanVisibility(context, visible) {

function waitForVisibleScanner() {
  return new Promise(resolve => {
    const reader = document.getElementById('qr-reader');
    const check = () => {
      const rect = reader.getBoundingClientRect();
      if (rect.width > 0 && rect.height >= 250) {
        resolve();
        return;
      }
      window.requestAnimationFrame(check);
    };
    window.requestAnimationFrame(check);
  });
}

function getScannerFormats() {
  if (typeof Html5QrcodeSupportedFormats === 'undefined') return undefined;
  return [
    Html5QrcodeSupportedFormats.QR_CODE,
    Html5QrcodeSupportedFormats.CODE_128,
    Html5QrcodeSupportedFormats.CODE_39,
    Html5QrcodeSupportedFormats.CODE_93,
    Html5QrcodeSupportedFormats.CODABAR,
    Html5QrcodeSupportedFormats.ITF,
    Html5QrcodeSupportedFormats.EAN_8,
    Html5QrcodeSupportedFormats.EAN_13,
    Html5QrcodeSupportedFormats.UPC_A,
    Html5QrcodeSupportedFormats.UPC_E,
    Html5QrcodeSupportedFormats.UPC_EAN_EXTENSION,
    Html5QrcodeSupportedFormats.PDF_417,
    Html5QrcodeSupportedFormats.DATA_MATRIX,
    Html5QrcodeSupportedFormats.AZTEC
  ].filter(format => format !== undefined);
}

async function getNativeBarcodeFormats() {
  const wanted = [
    'qr_code',
    'code_128',
    'code_39',
    'code_93',
    'codabar',
    'itf',
    'ean_8',
    'ean_13',
    'upc_a',
    'upc_e',
    'pdf417',
    'data_matrix',
    'aztec'
  ];

  if (typeof BarcodeDetector === 'undefined') return wanted;
  if (typeof BarcodeDetector.getSupportedFormats !== 'function') return wanted;

  try {
    const supported = await BarcodeDetector.getSupportedFormats();
    return wanted.filter(format => supported.includes(format));
  } catch (err) {
    return wanted;
  }
}

function getImageSourceSize(source) {
  return {
    width: source.videoWidth || source.naturalWidth || source.width || 0,
    height: source.videoHeight || source.naturalHeight || source.height || 0
  };
}

function buildProcessedCanvas(source, options) {
  const size = getImageSourceSize(source);
  const sx = Math.max(0, Math.floor((options.sx || 0) * size.width));
  const sy = Math.max(0, Math.floor((options.sy || 0) * size.height));
  const sw = Math.max(1, Math.floor((options.sw || 1) * size.width));
  const sh = Math.max(1, Math.floor((options.sh || 1) * size.height));
  const rotate = options.rotate || 0;
  const scale = options.scale || 1;
  const drawWidth = Math.max(1, Math.floor(sw * scale));
  const drawHeight = Math.max(1, Math.floor(sh * scale));
  const swap = rotate === 90 || rotate === 270;

  const canvas = document.createElement('canvas');
  canvas.width = swap ? drawHeight : drawWidth;
  canvas.height = swap ? drawWidth : drawHeight;

  const ctx = canvas.getContext('2d', { willReadFrequently: true });
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';

  if (swap) {
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate((rotate * Math.PI) / 180);
    ctx.drawImage(source, sx, sy, sw, sh, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
  } else if (rotate === 180) {
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.rotate(Math.PI);
    ctx.drawImage(source, sx, sy, sw, sh, -drawWidth / 2, -drawHeight / 2, drawWidth, drawHeight);
  } else {
    ctx.drawImage(source, sx, sy, sw, sh, 0, 0, drawWidth, drawHeight);
  }

  if (options.threshold || options.grayscale) {
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    let total = 0;

    for (let i = 0; i < data.length; i += 4) {
      const gray = Math.round((data[i] * 0.299) + (data[i + 1] * 0.587) + (data[i + 2] * 0.114));
      data[i] = gray;
      data[i + 1] = gray;
      data[i + 2] = gray;
      total += gray;
    }

    if (options.threshold) {
      const avg = total / Math.max(1, data.length / 4);
      const threshold = Math.max(90, Math.min(190, Math.round(avg)));
      for (let i = 0; i < data.length; i += 4) {
        const value = data[i] >= threshold ? 255 : 0;
        data[i] = value;
        data[i + 1] = value;
        data[i + 2] = value;
      }
    }

    ctx.putImageData(imageData, 0, 0);
  }

  return canvas;
}

function buildBarcodeScanVariants(source) {
  const variants = [
    { label: 'full-color', sx: 0, sy: 0, sw: 1, sh: 1, scale: 1.6 },
    { label: 'full-rot90', sx: 0, sy: 0, sw: 1, sh: 1, scale: 1.6, rotate: 90 },
    { label: 'full-rot270', sx: 0, sy: 0, sw: 1, sh: 1, scale: 1.6, rotate: 270 },
    { label: 'full-threshold', sx: 0, sy: 0, sw: 1, sh: 1, scale: 2.1, threshold: true },
    { label: 'bottom-strip', sx: 0.05, sy: 0.52, sw: 0.9, sh: 0.36, scale: 2.4, threshold: true },
    { label: 'left-strip-rot90', sx: 0.02, sy: 0.18, sw: 0.46, sh: 0.64, scale: 2.4, threshold: true, rotate: 90 },
    { label: 'left-strip-rot270', sx: 0.02, sy: 0.18, sw: 0.46, sh: 0.64, scale: 2.4, threshold: true, rotate: 270 },
    { label: 'right-strip-rot90', sx: 0.5, sy: 0.1, sw: 0.46, sh: 0.8, scale: 2.1, grayscale: true, rotate: 90 },
    { label: 'right-strip-rot270', sx: 0.5, sy: 0.1, sw: 0.46, sh: 0.8, scale: 2.1, grayscale: true, rotate: 270 }
  ];

  return variants.map(variant => ({
    label: variant.label,
    canvas: buildProcessedCanvas(source, variant)
  }));
}

function buildOcrVariants(source) {
  const variants = [
    { label: 'ocr-full-rot90', sx: 0, sy: 0, sw: 1, sh: 1, scale: 1.6, grayscale: true, rotate: 90 },
    { label: 'ocr-full-rot270', sx: 0, sy: 0, sw: 1, sh: 1, scale: 1.6, grayscale: true, rotate: 270 },
    { label: 'ocr-right', sx: 0.5, sy: 0.08, sw: 0.45, sh: 0.84, scale: 2.2, threshold: true, rotate: 90 },
    { label: 'ocr-right-alt', sx: 0.5, sy: 0.08, sw: 0.45, sh: 0.84, scale: 2.2, threshold: true, rotate: 270 }
  ];

  return variants.map(variant => ({
    label: variant.label,
    canvas: buildProcessedCanvas(source, variant)
  }));
}

function extractSerialFromText(rawText) {
  const source = String(rawText || '').toUpperCase();
  const normalized = source
    .replace(/[|]/g, '1')
    .replace(/[O]/g, '0')
    .replace(/[^A-Z0-9_-]+/g, ' ');

  const patterns = [
    /MK[\s:_-]*\d{4,}/g,
    /\b[A-Z]{1,4}[\s:_-]*\d{4,12}\b/g,
    /\b\d{7,12}\b/g
  ];

  for (const pattern of patterns) {
    const matches = normalized.match(pattern) || [];
    for (const match of matches) {
      const candidate = normalizeSerial(match.replace(/[\s:_-]+/g, ''));
      if (candidate && isValidSerial(candidate)) return candidate;
    }
  }

  return '';
}

function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      URL.revokeObjectURL(url);
      resolve(img);
    };
    img.onerror = err => {
      URL.revokeObjectURL(url);
      reject(err);
    };
    img.src = url;
  });
}

function ensureTesseract() {
  if (window.Tesseract) return Promise.resolve(window.Tesseract);
  if (QR.tesseractLoader) return QR.tesseractLoader;

  QR.tesseractLoader = new Promise((resolve, reject) => {
    const existing = document.querySelector('script[data-lib="tesseract-js"]');
    if (existing) {
      existing.addEventListener('load', () => resolve(window.Tesseract), { once: true });
      existing.addEventListener('error', reject, { once: true });
      return;
    }

    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js';
    script.async = true;
    script.dataset.lib = 'tesseract-js';
    script.onload = () => resolve(window.Tesseract);
    script.onerror = () => reject(new Error('Library OCR gagal dimuat.'));
    document.head.appendChild(script);
  });

  return QR.tesseractLoader;
}

async function detectBarcodeFromSource(source) {
  if (typeof BarcodeDetector === 'undefined') return '';
  const formats = await getNativeBarcodeFormats();
  const detector = new BarcodeDetector({ formats });
  const variants = buildBarcodeScanVariants(source);

  for (const variant of variants) {
    try {
      const barcodes = await detector.detect(variant.canvas);
      if (barcodes && barcodes.length) {
        const rawValue = (barcodes.find(item => item && item.rawValue) || barcodes[0]).rawValue || '';
        const serial = normalizeSerial(rawValue);
        if (serial && isValidSerial(serial)) {
          setQRDiagnostic('Barcode terbaca dari varian gambar: ' + variant.label);
          return serial;
        }
      }
    } catch (err) {
      console.warn('Barcode variant failed', variant.label, err);
    }
  }

  return '';
}

async function detectTextSerialFromSource(source) {
  const Tesseract = await ensureTesseract();
  const variants = buildOcrVariants(source);

  for (const variant of variants) {
    document.getElementById('qr-result-text').textContent = 'Membaca teks kartu...';
    try {
      const result = await Tesseract.recognize(variant.canvas, 'eng', {
        tessedit_pageseg_mode: '6',
        tessedit_char_whitelist: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789-_'
      });
      const serial = extractSerialFromText(result && result.data && result.data.text);
      if (serial) {
        setQRDiagnostic('Serial ditemukan dari OCR varian: ' + variant.label);
        return serial;
      }
    } catch (err) {
      console.warn('OCR variant failed', variant.label, err);
    }
  }

  return '';
}

async function getCameraPermissionState() {
  if (!navigator.permissions || !navigator.permissions.query) return 'unknown';
  try {
    const status = await navigator.permissions.query({ name: 'camera' });
    return status.state || 'unknown';
  } catch(err) {
    return 'unknown';
  }
}

function getCameraPolicyState() {
  try {
    if (document.permissionsPolicy && document.permissionsPolicy.allowsFeature) {
      return document.permissionsPolicy.allowsFeature('camera') ? 'allowed' : 'blocked';
    }
    if (document.featurePolicy && document.featurePolicy.allowsFeature) {
      return document.featurePolicy.allowsFeature('camera') ? 'allowed' : 'blocked';
    }
  } catch(err) {
    return 'unknown';
  }
  return 'unknown';
}

function isTopWindow() {
  try {
    return window.self === window.top;
  } catch(err) {
    return false;
  }
}

function buildCameraDiagnostic(permissionState, policyState, mode) {
  return [
    'Mode: ' + mode,
    'Permission: ' + permissionState,
    'Policy: ' + policyState,
    'HTTPS: ' + (window.isSecureContext ? 'yes' : 'no'),
    'Top frame: ' + (isTopWindow() ? 'yes' : 'no'),
    'getUserMedia: ' + (navigator.mediaDevices && navigator.mediaDevices.getUserMedia ? 'available' : 'missing')
  ].join(' | ');
}

function normalizeCameraError(err) {
  const rawMessage = err && (err.message || err.name || String(err));
  const message = rawMessage || 'Browser belum memberi akses kamera.';

  if (err && err.code === 'CAMERA_POLICY_BLOCKED') {
    return {
      title: 'Akses kamera diblokir browser',
      msg: 'Browser memblokir kamera untuk konteks halaman ini sebelum prompt izin bisa muncul. Buka URL web app hasil deployment /exec langsung di Chrome, bukan preview editor, lalu coba SCAN QR lagi.'
    };
  }

  if (err && err.code === 'CAMERA_PERMISSION_DENIED_STICKY') {
    return {
      title: 'Izin kamera sudah ditolak',
      msg: 'Browser sudah menyimpan status kamera sebagai Block/Deny untuk halaman ini, jadi prompt tidak akan muncul lagi. Reset izin dari ikon gembok di address bar atau Site settings > Camera > Allow, lalu muat ulang aplikasi.'
    };
  }

  if (err && err.code === 'INSECURE_CONTEXT') {
    return {
      title: 'Kamera butuh HTTPS',
      msg: 'Browser hanya membuka kamera pada halaman HTTPS yang aman. Gunakan URL deployment Apps Script yang diawali https://script.google.com/.../exec.'
    };
  }

  if (err && err.code === 'NO_BARCODE_DETECTOR') {
    return {
      title: 'Scanner native tidak tersedia',
      msg: 'Browser ini tidak menyediakan BarcodeDetector. Fallback scanner akan dicoba otomatis.'
    };
  }

  if (/notallowed|permission|denied|izin/i.test(message)) {
    return {
      title: 'Izin kamera belum aktif',
      msg: 'Browser menolak akses kamera. Jika prompt tidak muncul, reset izin kamera dari ikon gembok di address bar atau Site settings > Camera > Allow, lalu muat ulang aplikasi.'
    };
  }

  if (/notfound|devicesnotfound|no camera/i.test(message)) {
    return {
      title: 'Kamera tidak ditemukan',
      msg: 'Perangkat tidak mengembalikan kamera yang bisa dipakai oleh browser.'
    };
  }

  if (/notreadable|trackstart|in use|busy/i.test(message)) {
    return {
      title: 'Kamera sedang dipakai',
      msg: 'Tutup aplikasi lain yang memakai kamera, lalu klik SCAN QR lagi.'
    };
  }

  return {
    title: 'Kamera gagal dibuka',
    msg: message + '\n\nKlik SCAN QR lagi dan pilih Izinkan/Allow jika prompt kamera muncul.'
  };
}

function requestNativeCameraStream() {
  if (!window.isSecureContext) {
    const err = new Error('Halaman bukan secure context.');
    err.code = 'INSECURE_CONTEXT';
    throw err;
  }
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    throw new Error('Browser tidak menyediakan akses kamera.');
  }
  return navigator.mediaDevices.getUserMedia({
    audio: false,
    video: {
      facingMode: { ideal: 'environment' },
      width: { ideal: 1280 },
      height: { ideal: 720 }
    }
  });
}

async function startNativeCameraScanner(stream) {
  if (typeof BarcodeDetector === 'undefined') {
    const err = new Error('BarcodeDetector tidak tersedia.');
    err.code = 'NO_BARCODE_DETECTOR';
    throw err;
  }

  const reader = document.getElementById('qr-reader');
  if (!reader) {
    if (stream && stream.getTracks) {
      stream.getTracks().forEach(track => track.stop());
    }
    throw new Error('Elemen scanner tidak ditemukan.');
  }

  reader.innerHTML = '';

  const video = document.createElement('video');
  video.className = 'qr-video';
  video.setAttribute('playsinline', 'true');
  video.setAttribute('muted', 'true');
  video.setAttribute('autoplay', 'true');
  video.srcObject = stream;
  reader.appendChild(video);

  QR.stream = stream;
  QR.video = video;
  const nativeFormats = await getNativeBarcodeFormats();
  QR.detector = new BarcodeDetector({ formats: nativeFormats });
  QR.usingNative = true;
  QR.successHandled = false;

  await video.play();
  document.getElementById('qr-result-text').textContent = 'Kamera aktif. Arahkan ke barcode/QR.';

  const tick = async () => {
    if (!QR.isScanning || QR.successHandled || !QR.video) return;

    try {
      if (QR.video.readyState >= 2) {
        const barcodes = await QR.detector.detect(QR.video);
        if (barcodes && barcodes.length > 0) {
          const rawValue = (barcodes.find(item => item && item.rawValue) || barcodes[0]).rawValue || '';
          const serial = normalizeSerial(rawValue);
          if (serial && isValidSerial(serial)) {
            QR.successHandled = true;
            indicateScanSuccess();
            document.getElementById('qr-result-text').textContent = 'Ditemukan: ' + serial;
            await stopQRScanner();
            onSerialScanned(QR.context, serial);
            return;
          }
        }
      }
    } catch (err) {
      const message = String(err && (err.name || err.message || err));
      if (!/notfounderror|invalidstateerror|operationerror/i.test(message)) {
        setQRDiagnostic('Scanner native aktif, tapi barcode belum terbaca stabil. Coba dekatkan kartu dan kurangi silau.');
      }
    }

    if (QR.isScanning && !QR.successHandled) {
      QR.scanFrame = window.requestAnimationFrame(tick);
    }
  };

  QR.scanFrame = window.requestAnimationFrame(tick);
}

function showScanToast(message) {
  const toast = document.getElementById('scan-toast');
  if (!toast) return;
  toast.textContent = message;
  toast.classList.add('show');
  window.clearTimeout(showScanToast.timer);
  showScanToast.timer = window.setTimeout(() => toast.classList.remove('show'), 4500);
}

function indicateScanSuccess() {
  if (navigator.vibrate) navigator.vibrate(60);
  showScanToast('Scan berhasil');
}


// ── LIVE QR SCANNER (WebRTC) ───────────────────────────────

async function startHtml5CameraScanner() {
  if (typeof Html5Qrcode === 'undefined') {
    throw new Error('Library Html5Qrcode belum termuat.');
  }

  const reader = document.getElementById('qr-reader');
  if (!reader) throw new Error('Elemen scanner tidak ditemukan.');

  reader.innerHTML = '';

  const formats = getScannerFormats();
  if (!QR.html5QrCode) {
    QR.html5QrCode = new Html5Qrcode('qr-reader', formats ? { formatsToSupport: formats } : undefined);
  }

  QR.usingNative = false;
  QR.successHandled = false;
  document.getElementById('qr-result-text').textContent = 'Mencari barcode/QR...';

    const config = {
      fps: 10,
      qrbox: { width: 320, height: 180 },
      aspectRatio: 1.0,
      disableFlip: false
    };

  await QR.html5QrCode.start(
    { facingMode: 'environment' },
    config,
    async decodedText => {
      const serial = normalizeSerial(decodedText);
      if (!serial || !isValidSerial(serial) || QR.successHandled) return;
      QR.successHandled = true;
      indicateScanSuccess();
      document.getElementById('qr-result-text').textContent = 'Ditemukan: ' + serial;
      await stopQRScanner();
      onSerialScanned(QR.context, serial);
    },
    () => {}
  );
}

function cleanupNativeScanner() {
  if (QR.scanFrame) {
    window.cancelAnimationFrame(QR.scanFrame);
    QR.scanFrame = null;
  }
  if (QR.video) {
    try { QR.video.pause(); } catch (err) {}
    try { QR.video.srcObject = null; } catch (err) {}
    if (QR.video.parentNode) QR.video.parentNode.removeChild(QR.video);
    QR.video = null;
  }
  if (QR.stream && QR.stream.getTracks) {
    QR.stream.getTracks().forEach(track => track.stop());
  }
  QR.stream = null;
  QR.detector = null;
  QR.usingNative = false;
}

function prefersDirectCaptureFallback() {
  const ua = (navigator.userAgent || '').toLowerCase();
  const isMobile = /android|iphone|ipad|ipod/.test(ua);
  return isMobile && getCameraPolicyState() === 'blocked';
}

function openDirectCaptureFallback(context) {
  const input = document.getElementById('qr-fallback-input');
  if (!input) return false;
  QR.context = context;
  showResult(context, 'warning', 'Live camera dibatasi oleh web app Apps Script di browser ini. Kamera foto perangkat dibuka sebagai mode scan yang lebih stabil.');
  input.click();
  return true;
}

function syncScanButtonMode() {
  const useCaptureFallback = prefersDirectCaptureFallback();
  document.querySelectorAll('.btn-scan-qr span').forEach(span => {
    span.textContent = useCaptureFallback ? 'BUKA KAMERA FOTO' : 'BUKA KAMERA (SCAN)';
  });
}

async function ensureFileScanner() {
  if (typeof Html5Qrcode === 'undefined') {
    throw new Error('Library Html5Qrcode belum termuat.');
  }
  if (QR.html5QrCode) return QR.html5QrCode;

  let dummyReader = document.getElementById('dummy-qr-reader');
  if (!dummyReader) {
    dummyReader = document.createElement('div');
    dummyReader.id = 'dummy-qr-reader';
    dummyReader.style.display = 'none';
    document.body.appendChild(dummyReader);
  }

  const formats = getScannerFormats();
  QR.html5QrCode = new Html5Qrcode('dummy-qr-reader', formats ? { formatsToSupport: formats } : undefined);
  return QR.html5QrCode;
}

function showScannerFailure(context, err, mode) {
  const info = normalizeCameraError(err);
  const permissionStatePromise = getCameraPermissionState().catch(() => 'unknown');
  Promise.resolve(permissionStatePromise).then(permissionState => {
    const policyState = getCameraPolicyState();
    setQRDiagnostic(info.msg + '\n\n' + buildCameraDiagnostic(permissionState, policyState, mode));
  });
  document.getElementById('qr-result-text').textContent = info.title;
  showResult(context, 'error', info.msg);
}

window.openLiveScanner = async function(context) {
  const overlay = document.getElementById('qr-overlay');
  const fbBtn = document.getElementById('qr-fallback-btn');
  if (fbBtn) fbBtn.style.display = 'none';
  const reader = document.getElementById('qr-reader');
  if (!overlay || !reader) return;

  if (QR.isStarting || QR.isScanning) return;

  if (prefersDirectCaptureFallback()) {
    openDirectCaptureFallback(context);
    return;
  }

  // Set current context
  QR.context = context;
  QR.successHandled = false;

  // Reset overlay
  document.getElementById('qr-result-text').textContent = 'Mencari barcode/QR...';
  setQRDiagnostic('');
  document.body.classList.add('scanner-open');
  overlay.classList.add('active');

  QR.isStarting = true;
  QR.isScanning = true;

  try {
    await waitForVisibleScanner();

    const preferredMode = typeof BarcodeDetector !== 'undefined' ? 'native' : 'html5-qrcode';
    const permissionState = await getCameraPermissionState();
    const policyState = getCameraPolicyState();
    setQRDiagnostic(buildCameraDiagnostic(permissionState, policyState, preferredMode));

    if (policyState === 'blocked') {
      const err = new Error('Akses kamera diblokir oleh permission policy host.');
      err.code = 'CAMERA_POLICY_BLOCKED';
      throw err;
    }

    if (permissionState === 'denied') {
      const err = new Error('Izin kamera sudah ditolak browser.');
      err.code = 'CAMERA_PERMISSION_DENIED_STICKY';
      throw err;
    }

    if (typeof BarcodeDetector !== 'undefined') {
      try {
        const stream = await requestNativeCameraStream();
        await startNativeCameraScanner(stream);
        return;
      } catch (nativeErr) {
        cleanupNativeScanner();
        const message = String(nativeErr && (nativeErr.code || nativeErr.name || nativeErr.message || nativeErr));
        if (/CAMERA_POLICY_BLOCKED|CAMERA_PERMISSION_DENIED_STICKY|INSECURE_CONTEXT|NotAllowedError|NotFoundError|NotReadableError/i.test(message)) {
          throw nativeErr;
        }
      }
    }

    await startHtml5CameraScanner();
  } catch (err) {
    const fbButton = document.getElementById('qr-fallback-btn');
    if (fbButton) fbButton.style.display = 'block';
    showScannerFailure(context, err, typeof BarcodeDetector !== 'undefined' ? 'native/html5-qrcode' : 'html5-qrcode');
    QR.isScanning = false;
    cleanupNativeScanner();
  } finally {
    QR.isStarting = false;
  }
};

window.stopQRScanner = async function() {
  if (QR.isStopping) return;
  QR.isStopping = true;

  if (QR.html5QrCode && QR.isScanning && !QR.usingNative) {
    try {
      await QR.html5QrCode.stop();
    } catch (e) {
      console.warn('Failed to stop QR scanner', e);
    }
  }

  cleanupNativeScanner();
  QR.isScanning = false;
  QR.isStarting = false;
  QR.isStopping = false;
  QR.successHandled = false;
  const overlay = document.getElementById('qr-overlay');
  const fbBtn = document.getElementById('qr-fallback-btn');
  if (fbBtn) fbBtn.style.display = 'none';
  if (overlay) overlay.classList.remove('active');
  document.body.classList.remove('scanner-open');
};


window.handleFallbackImage = async function(e) {
  const file = e.target.files[0];
  if (!file) return;
  document.getElementById('qr-result-text').textContent = 'Memproses gambar...';
  setQRDiagnostic('');
  try {
    let decodedText = null;

    if (typeof BarcodeDetector !== 'undefined') {
      try {
        const source = await loadImageFromFile(file);
        decodedText = await detectBarcodeFromSource(source);
      } catch (err) {
        console.warn('Native fallback scan failed', err);
      }
    }

    if (!decodedText) {
      try {
        const scanner = await ensureFileScanner();
        decodedText = await scanner.scanFile(file, true);
      } catch (err) {
        console.warn('Html5 file scan failed', err);
      }
    }

    if (!decodedText) {
      try {
        const source = await loadImageFromFile(file);
        decodedText = await detectTextSerialFromSource(source);
      } catch (err) {
        console.warn('OCR fallback failed', err);
      }
    }

    const serial = normalizeSerial(decodedText);
    if (serial && isValidSerial(serial)) {
      indicateScanSuccess();
      document.getElementById('qr-result-text').textContent = 'Ditemukan: ' + serial;
      stopQRScanner().then(() => {
        onSerialScanned(QR.context, serial);
      });
    } else {
      setQRDiagnostic('Barcode belum terbaca. Coba foto lebih dekat, luruskan kartu, atau pastikan nomor NIK/serial terlihat jelas.');
    }
  } catch (err) {
    setQRDiagnostic('Barcode tidak terdeteksi pada gambar, dan OCR juga belum menemukan serial/NIK yang valid.');
  }
  e.target.value = ''; // reset
};

function bindUiEvents() {
  const logo = document.getElementById('dam-logo');
  if (logo) logo.addEventListener('error', () => { logo.style.display = 'none'; });

  const btnHamburger = document.getElementById('btn-hamburger');
  const overlay = document.getElementById('sidebar-overlay');
  const tabbar = document.getElementById('app-tabbar');

  if (btnHamburger) {
    btnHamburger.addEventListener('click', () => {
      if(tabbar) tabbar.classList.toggle('open');
      if(overlay) overlay.classList.toggle('active');
    });
  }

  if (overlay) {
    overlay.addEventListener('click', () => {
      if(tabbar) tabbar.classList.remove('open');
      if(overlay) overlay.classList.remove('active');
    });
  }

  document.addEventListener('click', event => {
    const control = event.target.closest('[data-action]');
    if (!control) return;

    const action = control.dataset.action;
    const context = control.dataset.context;
    
    if (action === 'submit-login') handleLoginSubmit();
    if (action === 'submit-logout') handleLogout();
    if (action === 'switch-tab') switchTab(control.dataset.tab);
    if (action === 'close-qr') stopQRScanner();
    if (action === 'reset-serial') resetSerialInput(context);

    if (action === 'submit-serial') submitSerial(context);
    if (action === 'confirm-masuk') confirmMasuk();
    if (action === 'confirm-keluar') confirmKeluar();
    if (action === 'load-dashboard') loadDashboard();
    if (action === 'process-absen-report') processAbsenReport();
    if (action === 'export-absen-report') exportAbsenReport();
    if (action === 'process-area-report') processAreaReport();
  });

  document.addEventListener('input', event => {
    if (event.target.dataset.action !== 'search-karyawan') return;
    debounceSearch(event.target.value, event.target.dataset.context);
  });

  document.addEventListener('change', event => {
    if (event.target.dataset.action !== 'period-type') return;
    updatePeriodInput(event.target.dataset.target);
  });

  document.addEventListener('keydown', event => {
    const action = event.target.dataset.action;
    const context = event.target.dataset.context;

    if (event.key === 'Enter' && event.target.matches('input[id$="-serial"]')) {
      event.preventDefault();
      submitSerial(event.target.id.replace('-serial', ''));
    }
    if (event.key === 'Enter' && (event.target.id === 'login-nik' || event.target.id === 'login-password')) {
      event.preventDefault();
      handleLoginSubmit();
    }
    if (event.key === 'Enter' && event.target.id === 'cek-absen-nik') {
      event.preventDefault();
      processAbsenReport();
    }
    if (event.key === 'Enter' && event.target.id === 'cek-area-nik') {
      event.preventDefault();
      processAreaReport();
    }
  });
}

document.addEventListener('DOMContentLoaded', () => {

  bindUiEvents();
  syncScanButtonMode();
  updatePeriodInput('cek-absen');
  updatePeriodInput('cek-area');
  // Ensure all serial inputs start STRICTLY EMPTY
  resetAllSerialInputs();
  forceClearSerialInputs();
  window.setTimeout(forceClearSerialInputs, 0);
  // Clear any stale result cards
  ['masuk', 'keluar', 'security'].forEach(ctx => {
    const el = document.getElementById(ctx + '-result');
    if (el) { el.className = 'result-card'; el.innerHTML = ''; }
  });
  // Reset masuk state
  STATE.masuk = {
    selectedNIK: null,
    selectedNama: null,
    selectedType: null,
    selectedDept: null,
    selectedJabatan: null,
    scannedSerial: null,
    completed: false
  };
  STATE.keluar = { scannedSerial:null, bindingData:null };
  STATE.security = { scannedSerial:null };
  STATE.authBootPending = false;
  loadRecentLogs();

  const sessionNik = getIncomingSessionNik();
  if (sessionNik) {
    beginModuleAutoLogin(sessionNik);
    return;
  }

  setLoginUiMode('login');
  restoreSavedSession();
});

window.addEventListener('pageshow', () => {
  resetAllSerialInputs();
  forceClearSerialInputs();
  window.setTimeout(forceClearSerialInputs, 0);
});

// Close autocomplete on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrap')) {
    document.querySelectorAll('.autocomplete-list').forEach(l => l.style.display='none');
  }
});

function handleLogout() {
  localStorage.removeItem('dam_session');
  STATE.currentUser = null;
  resetAllSerialInputs();
  
  document.getElementById('app-header').style.display = 'none';
  document.getElementById('app-tabbar').style.display = 'none';
  
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  setLoginUiMode('login');
  
  const loginNik = document.getElementById('login-nik');
  const loginPwd = document.getElementById('login-password');
  if(loginNik) loginNik.value = '';
  if(loginPwd) loginPwd.value = '';
}
</script>
